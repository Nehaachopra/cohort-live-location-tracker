<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client form</title>
  <link rel="stylesheet" href="/client/style.css">
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/>
          <path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
      </div>
      <h1>Welcome</h1>
      <p class="subtitle">Please provide the following details.</p>
    </div>

    <form class="form" id="clientForm" novalidate>
      <div id="errorMsg" class="error-msg" role="alert"></div>

      <div class="field">
        <label for="email">Application display name</label>
        <input
          id="applicationDisplayName"
          name="applicationDisplayName"
          type="text"
          placeholder="Name"
          required
        />
      </div>

      <div class="field">
        <label for="applicationURL">Application URL</label>
        <input
          id="applicationURL"
          name="applicationURL"
          type="url"
          placeholder="https://yourapp.com"
          required
        />
      </div>

      <div class="field">
        <label for="redirectURI">Redirect URL</label>
        <input
          id="redirectURL"
          name="redirectURL"
          type="url"
          placeholder="https://yourapp.com/auth/callback"
          required
        />
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Submit</span>
      </button>
    </form>
  </div>

  <div class="details-card">
    <div class="header">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/>
          <path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
      </div>
      <h1>Registration successful</h1>
      <p class="subtitle">Please safely save these details.This card will disappear in 5 minutes.</p>
    </div>

    <div class="card-details">
      <div class="field">
        <label for="email">Client ID</label>
        <div class="input-wrapper">
          <input
            id="clientId"
            type="text"
            readonly
          />
          <button class="copy-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-copy" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="email">Client Secret</label>
        <div class="input-wrapper">
          <input
            id="clientSecret"
            type="text"
            readonly
          />
          <button class="copy-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-copy" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="close-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x" viewBox="0 0 16 16">
          <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="/client/script.js"></script>
</body>
</html>

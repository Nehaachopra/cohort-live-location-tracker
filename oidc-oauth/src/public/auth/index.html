<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>1 Million Checkboxes</title>
    <link rel="stylesheet" href="/auth/style.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="sign-up-card">
        <h2 class="sign-up-title">Welcome</h2>
        <p class="sign-up-description">
          Sign up to continue
        </p>
        <div class="success-message non-visible" id="signUpSuccess"></div>
        <div class="error-message non-visible"></div>
        <form class="sign-up-form" id="signUpForm">
          <input
            type="text"
            id="firstName"
            class="sign-up-input"
            placeholder="First Name"
            required
          />
          <input
            type="text"
            id="lastName"
            class="sign-up-input"
            placeholder="Last Name"
          />
          <input
            type="email"
            id="email"
            class="sign-up-input"
            placeholder="Email"
            required
          />
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              class="sign-up-input"
              placeholder="Password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword">Show</button>
          </div>
          <button type="submit" class="sign-up-button">Sign Up</button>
        </form>
        <p class="sign-up-footer">
          Already have an account? <a class="sign-up-link" id="signInLink">Sign In</a>
        </p>
      </div>

      <div class="sign-in-card">
        <h2 class="sign-up-title">Welcome Back</h2>
        <p class="sign-up-description">
          Sign in to continue.
        </p>
        <div class="success-message non-visible" id="signInSuccess"></div>
        <div class="error-message non-visible">
          </div>
        <form class="sign-up-form" id="signInForm">
          <input
            type="email"
            id="email"
            class="sign-up-input"
            placeholder="Email"
            required
          />

          <a class="forgot-password">Forgot password?</a>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              class="sign-up-input"
              placeholder="Password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword">Show</button>
          </div>
          <button type="submit" class="sign-up-button">Sign In</button>
        </form>
        <p class="sign-up-footer">
          New user? <a class="sign-up-link" id="signUpLink">Sign up</a>
        </p>
      </div>
    </div>

    <script src="/auth/script.js"></script>
  </body>
</html>
